<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bioskop Ippnuda - Streaming Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">BIOSKOP <span>IPPNUDA</span></div>
        <button id="searchBtn" class="icon-btn"><i class="fas fa-search"></i></button>
    </header>

    <div id="searchOverlay" class="search-overlay">
        <div class="search-header">
            <button id="closeSearch" class="icon-btn"><i class="fas fa-arrow-left"></i></button>
            <input type="text" id="searchInput" placeholder="Cari judul atau genre...">
        </div>
    </div>

    <div class="genre-container">
        <button class="genre-btn active" data-genre="All">Semua</button>
        <button class="genre-btn" data-genre="Action">Action</button>
        <button class="genre-btn" data-genre="Adventure">Adventure</button>
        <button class="genre-btn" data-genre="Animasi">Animasi</button>
        <button class="genre-btn" data-genre="Dokumenter">Dokumenter</button>
        <button class="genre-btn" data-genre="Drama">Drama</button>
        <button class="genre-btn" data-genre="Fantasi">Fantasi</button>
        <button class="genre-btn" data-genre="Horor">Horor</button>
        <button class="genre-btn" data-genre="Kolosal">Kolosal</button>
        <button class="genre-btn" data-genre="Komedi">Komedi</button>
        <button class="genre-btn" data-genre="Perjuangan">Perjuangan</button>
        <button class="genre-btn" data-genre="Religi">Religi</button>
        <button class="genre-btn" data-genre="Romance">Romance</button>
    </div>

    <main>
        <div id="movieGrid" class="movie-grid">
            </div>

        <div class="pagination">
            <button id="prevBtn" class="page-btn"><i class="fas fa-chevron-left"></i> Prev</button>
            <span id="pageInfo">Halaman 1</span>
            <button id="nextBtn" class="page-btn">Next <i class="fas fa-chevron-right"></i></button>
        </div>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="fas fa-times"></i></button>
            <div class="video-wrapper">
                <div class="video-container">
                    <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="modal-info">
                <h2 id="modalTitle">Judul Film</h2>
                <p>&copy; Bioskop Ippnuda Premium</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Bioskop Ippnuda | Created by Ippnuda</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
