<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Tipi - Streaming Modern</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">BIOSKOP <span>IPPNUDA</span></div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari film favorit...">
            </div>
        </nav>
    </header>

    <div class="hero">
        <h1>Selamat Datang di Bioskop Ippnuda</h1>
        <p>Streaming film favorit langsung dari koleksi pribadi.</p>
    </div>

    <section class="genre-container">
        <button class="genre-btn active" data-genre="All">Semua</button>
        <button class="genre-btn" data-genre="Action">Action</button>
        <button class="genre-btn" data-genre="Adventure">Adventure</button>
        <button class="genre-btn" data-genre="Animasi">Animasi</button>
        <button class="genre-btn" data-genre="Dokumenter">Dokumenter</button>
        <button class="genre-btn" data-genre="Drama">Drama</button>
        <button class="genre-btn" data-genre="Fantasi">Fantasi</button>
        <button class="genre-btn" data-genre="Horor">Horor</button>
        <button class="genre-btn" data-genre="Kolosal">Kolosal</button>
        <button class="genre-btn" data-genre="Komedi">Komedi</button>
        <button class="genre-btn" data-genre="Perjuangan">Perjuangan</button>
        <button class="genre-btn" data-genre="Religi">Religi</button>
        <button class="genre-btn" data-genre="Romance">Romance</button>
    </section>

    <main id="movieGrid" class="movie-grid">
        </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-container">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="modal-info">
                <h2 id="modalTitle">Judul Film</h2>
                <span id="modalGenre">Genre</span>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 | Created by <strong>Ippnuda</strong></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
